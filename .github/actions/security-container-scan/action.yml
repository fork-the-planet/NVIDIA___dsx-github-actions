name: security-container-scan
description: Generate SBOM (Syft) and scan a locally-built container image with Grype, uploading JSON/SARIF reports and writing a summary.

inputs:
  image:
    description: 'Local container image reference to scan (must exist on the runner), e.g. "localbuild/testimage:latest"'
    required: true
  fail-on:
    description: 'Minimum severity to fail (passed to grype as --fail-on). One of: negligible, low, medium, high, critical'
    required: false
    default: high
  fail-build:
    description: 'If true, fail this step when Grype finds vulnerabilities at/above fail-on (or when SBOM/scan prerequisites fail)'
    required: false
    default: 'false'
  grype-image:
    description: 'Grype container image to run'
    required: false
    default: anchore/grype:latest
  report-json:
    description: 'Filename for JSON report'
    required: false
    default: grype-results.json
  report-sarif:
    description: 'Filename for SARIF report'
    required: false
    default: grype-results.sarif
  report-table:
    description: 'Filename for the human-readable table report (always produced).'
    required: false
    default: grype-results.txt
  upload-artifact:
    description: 'Upload reports as a workflow artifact'
    required: false
    default: 'true'
  artifact-name:
    description: 'Artifact name for uploaded reports'
    required: false
    default: grype-container-scan
  generate-sbom:
    description: 'Generate and upload SBOM using anchore/sbom-action'
    required: false
    default: 'true'
  sbom-format:
    description: 'SBOM format for sbom-action'
    required: false
    default: spdx-json
  sbom-artifact-name:
    description: 'Artifact name for the SBOM uploaded by sbom-action'
    required: false
    default: container.spdx.json
  write-summary:
    description: 'Write a human-friendly summary into $GITHUB_STEP_SUMMARY'
    required: false
    default: 'true'
  upload-sarif:
    description: 'Upload the SARIF report to GitHub code scanning (Security tab). Requires `security-events: write` permission on the caller job and, for private repositories, GitHub Advanced Security. Upload failures are non-fatal.'
    required: false
    default: 'false'
  sarif-category:
    description: 'Category for the SARIF upload. Use a unique value per image when multiple images are scanned in the same run so entries do not overwrite each other in the Security tab. When empty, defaults to `grype-<sanitized-image-ref>`.'
    required: false
    default: ''

outputs:
  status:
    description: 'ok | high_or_error | image_not_found | pull_failed | sbom_failed | grype_unknown'
    value: ${{ steps.final.outputs.status }}
  detail:
    description: 'Free-form detail string for status'
    value: ${{ steps.final.outputs.detail }}
  report_json:
    description: 'Path to JSON report (if generated)'
    value: ${{ steps.final.outputs.report_json }}
  report_sarif:
    description: 'Path to SARIF report (if generated)'
    value: ${{ steps.final.outputs.report_sarif }}
  report_table:
    description: 'Path to the table report (always generated).'
    value: ${{ steps.final.outputs.report_table }}

runs:
  using: composite
  steps:
    - name: Precheck local image exists
      id: precheck
      shell: bash
      env:
        INPUT_IMAGE: ${{ inputs.image }}
      run: |
        set +e
        docker image inspect "${INPUT_IMAGE}" >/dev/null 2>&1
        rc=$?
        if [ $rc -eq 0 ]; then
          echo "image_exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "image_exists=false" >> "$GITHUB_OUTPUT"
        fi
        exit 0

    - name: Generate SBOM (Syft via sbom-action)
      id: sbom
      if: ${{ inputs.generate-sbom == 'true' && steps.precheck.outputs.image_exists == 'true' }}
      continue-on-error: true
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        image: ${{ inputs.image }}
        format: ${{ inputs.sbom-format }}
        artifact-name: ${{ inputs.sbom-artifact-name }}

    - name: Run Grype scan (JSON + SARIF + table)
      id: grype
      if: ${{ steps.precheck.outputs.image_exists == 'true' }}
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        REPORT_JSON: ${{ inputs.report-json }}
        REPORT_SARIF: ${{ inputs.report-sarif }}
        REPORT_TABLE: ${{ inputs.report-table }}
        FAIL_ON: ${{ inputs.fail-on }}
        GRYPE_IMAGE: ${{ inputs.grype-image }}
      run: |
        set +e

        echo "Pulling Grype scanner image..."
        docker pull "${GRYPE_IMAGE}" >/dev/null 2>&1
        pull_rc=$?
        if [ $pull_rc -ne 0 ]; then
          echo "status=pull_failed" >> "$GITHUB_OUTPUT"
          echo "exit_code=3" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Scanning image: ${IMAGE}"
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$HOME/.cache/grype:/root/.cache/grype" \
          "${GRYPE_IMAGE}" \
          "${IMAGE}" --fail-on "${FAIL_ON}" -o json > "${REPORT_JSON}"
        scan_rc=$?

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$HOME/.cache/grype:/root/.cache/grype" \
          "${GRYPE_IMAGE}" \
          "${IMAGE}" -o sarif > "${REPORT_SARIF}" || true

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$HOME/.cache/grype:/root/.cache/grype" \
          "${GRYPE_IMAGE}" \
          "${IMAGE}" -o table > "${REPORT_TABLE}" || true

        echo "exit_code=${scan_rc}" >> "$GITHUB_OUTPUT"
        if [ $scan_rc -eq 0 ]; then
          echo "status=ok" >> "$GITHUB_OUTPUT"
        else
          echo "status=high_or_error" >> "$GITHUB_OUTPUT"
        fi
        exit 0

    - name: Compute SARIF category
      id: sarif-cat
      if: ${{ inputs.upload-sarif == 'true' && steps.precheck.outputs.image_exists == 'true' }}
      shell: bash
      env:
        INPUT_CATEGORY: ${{ inputs.sarif-category }}
        INPUT_IMAGE: ${{ inputs.image }}
      run: |
        set -euo pipefail
        if [ -n "${INPUT_CATEGORY}" ]; then
          category="${INPUT_CATEGORY}"
        else
          # Sanitize image ref for use as a code-scanning category (keep alnum, dot, underscore, dash)
          sanitized=$(echo "${INPUT_IMAGE}" | tr -c 'A-Za-z0-9._-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
          category="grype-${sanitized}"
        fi
        echo "category=${category}" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF to GitHub code scanning
      if: ${{ inputs.upload-sarif == 'true' && steps.precheck.outputs.image_exists == 'true' }}
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@fdbfb4d2750291e159f0156def62b853c2798ca2 # v4.31.5, use sha to align security guidelines
      with:
        sarif_file: ${{ inputs.report-sarif }}
        category: ${{ steps.sarif-cat.outputs.category }}

    - name: Upload Grype reports
      if: ${{ inputs.upload-artifact == 'true' && steps.precheck.outputs.image_exists == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        # if-no-files-found: ignore defensively covers the case where Grype
        # fails mid-run and produces only a subset of the three formats.
        path: |
          ${{ inputs.report-json }}
          ${{ inputs.report-sarif }}
          ${{ inputs.report-table }}
        if-no-files-found: ignore

    - name: Write scan summary
      if: ${{ inputs.write-summary == 'true' }}
      shell: bash
      env:
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        INPUT_REPORT_JSON: ${{ inputs.report-json }}
      run: |
        set -euo pipefail
        echo "### 🔍 Container Scan (SBOM + Grype)" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- Image: \`${INPUT_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- Reports artifact: \`${INPUT_ARTIFACT_NAME}\` (sarif + json)" >> "$GITHUB_STEP_SUMMARY"

        if [ -f "${INPUT_REPORT_JSON}" ]; then
        # --max-top 0 suppresses the top CVE table; run summaries can be public
        # on open-source repos, and listing specific vulns + package versions
        # is a roadmap for attackers. Per-CVE detail stays in the artifact.
        python3 "$GITHUB_ACTION_PATH/grype_summary.py" --json "${INPUT_REPORT_JSON}" --max-top 0 >> "$GITHUB_STEP_SUMMARY" || true
        fi

    - name: Finalize status/outputs
      id: final
      if: always()
      shell: bash
      env:
        IMAGE_EXISTS: ${{ steps.precheck.outputs.image_exists }}
        SBOM_OUTCOME: ${{ steps.sbom.outcome }}
        GRYPE_STATUS: ${{ steps.grype.outputs.status }}
        GRYPE_EXIT: ${{ steps.grype.outputs.exit_code }}
        INPUT_GENERATE_SBOM: ${{ inputs.generate-sbom }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_REPORT_JSON: ${{ inputs.report-json }}
        INPUT_REPORT_SARIF: ${{ inputs.report-sarif }}
        INPUT_REPORT_TABLE: ${{ inputs.report-table }}
        INPUT_FAIL_BUILD: ${{ inputs.fail-build }}
      run: |
        set -euo pipefail

        status="ok"
        detail="ok"

        if [ "${IMAGE_EXISTS}" != "true" ]; then
          status="image_not_found"
          detail="local docker image not found"
        elif [ "${INPUT_GENERATE_SBOM}" = "true" ] && [ "${SBOM_OUTCOME}" != "success" ]; then
          status="sbom_failed"
          detail="sbom-action failed"
        elif [ -z "${GRYPE_STATUS}" ]; then
          status="grype_unknown"
          detail="grype step did not produce status"
        elif [ "${GRYPE_STATUS}" = "ok" ]; then
          status="ok"
          detail="no vulnerabilities at/above fail-on=${INPUT_FAIL_ON}"
        elif [ "${GRYPE_STATUS}" = "high_or_error" ]; then
          status="high_or_error"
          detail="grype exit_code=${GRYPE_EXIT} (fail-on=${INPUT_FAIL_ON})"
        else
          status="${GRYPE_STATUS}"
          detail="grype exit_code=${GRYPE_EXIT}"
        fi

        echo "status=${status}" >> "$GITHUB_OUTPUT"
        echo "detail=${detail}" >> "$GITHUB_OUTPUT"
        echo "report_json=${INPUT_REPORT_JSON}" >> "$GITHUB_OUTPUT"
        echo "report_sarif=${INPUT_REPORT_SARIF}" >> "$GITHUB_OUTPUT"
        echo "report_table=${INPUT_REPORT_TABLE}" >> "$GITHUB_OUTPUT"

        if [ "${INPUT_FAIL_BUILD}" = "true" ] && [ "${status}" != "ok" ]; then
          echo "Failing build due to status=${status}: ${detail}" 1>&2
          exit 1
        fi
